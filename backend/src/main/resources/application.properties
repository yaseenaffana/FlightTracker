# Server Configuration
server.port=8080

# OpenSky Network API Configuration
opensky.api.url=https://opensky-network.org/api/states/all
# IMPORTANT: Do not hardcode credentials in source control.
# Set these in your environment instead:
# - OPENSKY_CLIENT_ID
# - OPENSKY_CLIENT_SECRET
#
# If credentials are not provided, the backend will call OpenSky anonymously.
opensky.api.clientId=${OPENSKY_CLIENT_ID:}
opensky.api.clientSecret=${OPENSKY_CLIENT_SECRET:}

# Cache Configuration
opensky.cache.ttl=30

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Logging
logging.level.com.flighttracker=DEBUG
logging.level.org.springframework.web.cors=DEBUG